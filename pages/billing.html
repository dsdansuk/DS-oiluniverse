<div class="panel" id="panel-billing" style="width:100%;overflow-y:auto;">
      <div style="max-width:900px;margin:0 auto;padding:24px 20px 100px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
          <div>
            <div style="font-family:var(--font-display);font-size:20px;font-weight:800;">💰 자동 정산 시스템</div>
            <div style="font-size:12px;color:var(--gray);margin-top:3px;">납품·수거 이력 기반 자동 계산 · 정산 차액 산정 · 계산서 발행</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <select id="billingMonthSel" onchange="renderBilling()" style="height:44px;border:1px solid var(--gray-light);border-radius:8px;padding:0 10px;font-size:14px;font-family:var(--font-body);"></select>
            <button onclick="renderBilling()" style="background:var(--green-main);border:none;border-radius:8px;padding:0 14px;height:44px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-body);">🔄 새로고침</button>
          </div>
        </div>
        <div id="billingKpi" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;"></div>
        <div id="billingList"></div>
      </div>
    </div>
