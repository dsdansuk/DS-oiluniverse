<div class="panel" id="panel-owner-login" style="overflow-y:auto;width:100%;">
      <div style="max-width:420px;margin:60px auto;padding:0 24px;">
        <div style="text-align:center;margin-bottom:28px;">
          <div style="font-size:44px;margin-bottom:10px;">🏪</div>
          <div style="font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-0.03em;margin-bottom:5px;">업주 로그인</div>
          <div style="font-size:12px;color:var(--gray);">내 업체의 재고·수거·발주를 관리하세요</div>
        </div>
        <div class="card" style="padding:26px;">
          <div class="form-group">
            <label class="form-label">아이디</label>
            <input class="form-input" id="ownerLoginId" placeholder="가입 시 설정한 아이디" style="font-size:14px;"
              onkeydown="if(event.key==='Enter')document.getElementById('ownerLoginPw').focus()">
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input class="form-input" id="ownerLoginPw" type="password" placeholder="가입 시 설정한 비밀번호" style="font-size:14px;"
              onkeydown="if(event.key==='Enter')doOwnerLogin()">
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:14px;" onclick="doOwnerLogin()">🔐 로그인</button>

          <!-- 회원가입 링크 -->
          <div style="text-align:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--gray-light);">
            <span style="font-size:12px;color:var(--gray);">아직 회원이 아니신가요?</span>
            <button onclick="showPanel('register',null)" style="background:none;border:none;color:var(--green-dark);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-body);margin-left:6px;text-decoration:underline;">
              🌿 회원가입 →
            </button>
          </div>
          <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--gray);">
            문의: <span style="color:var(--green-main);font-weight:700;cursor:pointer;" onclick="showToast('t1','📞 담당자 문의','010-9123-7042')">010-9123-7042</span>
          </div>
        </div>
      </div>
    </div>
