<div class="panel" id="panel-order" style="width:100%;">
      <div style="padding:22px 26px;">

        <!-- 헤더 KPI -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
          <div style="background:#1F4D30;border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);">
            <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:6px;">⚡ 자동발주 대기</div>
            <div style="font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--green-main);line-height:1;" id="orderAutoCount">0</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px;">재고 2캔 이하 · 자동발주 ON</div>
          </div>
          <div style="background:var(--white);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--gray-light);">
            <div style="font-size:11px;color:var(--gray);margin-bottom:6px;">📦 추가발주 요청</div>
            <div style="font-family:var(--font-display);font-size:28px;font-weight:800;color:#185FA5;line-height:1;" id="orderExtraCount">0</div>
            <div style="font-size:10px;color:var(--gray);margin-top:4px;">업주 직접 요청</div>
          </div>
          <div onclick="toggleOrderDonePanel()" id="orderDoneCard" style="background:var(--white);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);border:2px solid transparent;cursor:pointer;transition:all 0.2s;"
            onmouseover="this.style.borderColor='var(--green-main)'" onmouseout="if(!document.getElementById('orderDonePanel')||document.getElementById('orderDonePanel').style.display==='none')this.style.borderColor='transparent'">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div style="font-size:11px;color:var(--gray);">✅ 이번 달 납품</div>
              <span id="orderDoneArrow" style="font-size:12px;color:var(--gray);">▼</span>
            </div>
            <div style="font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--green-dark);line-height:1;margin-top:4px;" id="orderMonthTotal">0<span style="font-size:13px;font-weight:500"> 건</span></div>
            <div style="font-size:10px;color:var(--gray);margin-top:4px;" id="orderMonthSub">납품 이력 없음</div>
          </div>
        </div>

        <!-- 이번 달 납품 이력 펼침 패널 -->
        <div id="orderDonePanel" style="display:none;background:var(--white);border-radius:16px;padding:16px 20px;box-shadow:var(--shadow);margin-bottom:16px;border-left:4px solid var(--green-dark);">
          <div style="font-size:13px;font-weight:800;color:var(--green-dark);margin-bottom:12px;">✅ 이번 달 납품 완료 이력</div>
          <div id="orderDoneList"></div>
        </div>

        <!-- ① 자동발주 업체 목록 -->
        <div style="background:var(--white);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--gray-light);margin-bottom:16px;overflow:hidden;">
          <div style="background:#1F4D30;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
            <div style="font-family:var(--font-display);font-size:14px;font-weight:800;color:#fff;">⚡ 자동발주 업체 — 납품 대기</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.5);">재고 2캔 이하 · 자동발주 ON 업체</div>
          </div>
          <div id="autoOrderList" style="padding:4px 0;">
            <div style="text-align:center;padding:24px;color:var(--gray);font-size:13px;">✅ 자동발주 필요 업체 없음</div>
          </div>
        </div>

        <!-- ② 추가발주 요청 — 업주 QR 요청만 처리 (관리자/운반자는 처리만) -->
        <div style="background:var(--white);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--gray-light);margin-bottom:16px;overflow:hidden;">
          <div style="background:#185FA5;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-family:var(--font-display);font-size:14px;font-weight:800;color:#fff;">📦 추가발주 요청 — 납품 대기</div>
              <div style="font-size:10px;color:rgba(255,255,255,0.55);margin-top:2px;">업주가 QR에서 직접 요청한 발주 — 신청 후 납품완료</div>
            </div>
          </div>
          <div id="extraOrderList" style="padding:4px 0;">
            <div style="text-align:center;padding:24px;color:var(--gray);font-size:13px;">📭 추가발주 요청 없음</div>
          </div>
        </div>

        <!-- ③ 납품 이력 (전체, 최신순) -->
        <div style="background:var(--white);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--gray-light);">
          <div style="font-size:14px;font-weight:800;letter-spacing:-0.02em;margin-bottom:14px;">📋 납품 이력</div>
          <div id="todayDelivList">
            <div style="text-align:center;padding:20px;color:var(--gray);font-size:12px;">납품 이력 없음</div>
          </div>
        </div>

        <!-- 숨겨진 필드들 (JS 호환용) -->
        <input type="hidden" id="orderBizName">
        <input type="hidden" id="orderBizCode">
        <input type="hidden" id="summary-qty">
        <input type="hidden" id="summary-total">
        <input type="hidden" id="summary-unit">
        <input type="hidden" id="orderPendingList">
        <input type="hidden" id="newOilThresh">
        <input type="hidden" id="wasteOilThresh">
        <input type="hidden" id="autoToggle">
      </div>
    </div>
