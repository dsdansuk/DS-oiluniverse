<div class="panel" id="panel-waste">
      <div class="waste-layout">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
          <div onclick="toggleWasteSection('pending')" style="cursor:pointer;background:var(--white);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border:2px solid transparent;transition:all 0.2s;" id="wasteWaitCard"
            onmouseover="this.style.borderColor='var(--red-accent)'" onmouseout="this.style.borderColor='transparent'">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div class="stat-label">♻️ 수거 대기 중</div>
              <span id="wasteWaitArrow" style="font-size:12px;color:var(--gray);">▼</span>
            </div>
            <div class="stat-value" style="color:var(--red-accent)" id="wasteWaitCount">0</div>
            <div class="stat-sub" id="wasteWaitSub">수거 대기 없음</div>
          </div>
          <div onclick="toggleWasteSection('done')" style="cursor:pointer;background:var(--white);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border:2px solid transparent;transition:all 0.2s;" id="wasteDoneCard"
            onmouseover="this.style.borderColor='var(--green-main)'" onmouseout="this.style.borderColor='transparent'">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <div class="stat-label">✅ 이번 달 완료</div>
              <span id="wasteDoneArrow" style="font-size:12px;color:var(--gray);">▼</span>
            </div>
            <div class="stat-value" style="color:var(--green-main)" id="wasteDoneCount">0</div>
            <div class="stat-sub" id="wasteDoneSub">완료된 수거 없음</div>
          </div>
        </div>
        <!-- 수거 대기 펼침 패널 -->
        <div id="wastePendingPanel" style="display:none;background:var(--white);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);margin-bottom:14px;border-left:4px solid var(--red-accent);">
          <div style="font-size:13px;font-weight:800;color:var(--red-accent);margin-bottom:12px;">🚛 수거 대기 업체 목록</div>
          <div id="wastePendingList"></div>
        </div>

        <!-- 이번달 완료 펼침 패널 -->
        <div id="wasteDonePanel" style="display:none !important;visibility:hidden;height:0;overflow:hidden;padding:0;margin:0;">
          <div style="font-size:13px;font-weight:800;color:var(--green-dark);margin-bottom:12px;">✅ 이번 달 수거 완료 이력</div>
          <div id="wasteDoneList"></div>
        </div>

        <!-- 수거 완료 이력 -->
        <div style="background:var(--white);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--gray-light);">
          <div style="font-size:14px;font-weight:800;letter-spacing:-0.02em;margin-bottom:14px;">📋 수거 이력 <span style="font-size:10px;color:var(--gray);font-weight:500;">월별 합계 포함</span></div>
          <div id="wasteHistList">
            <div style="text-align:center;padding:20px;color:var(--gray);font-size:12px;">수거 이력 없음</div>
          </div>
        </div>
      </div>
    </div>
