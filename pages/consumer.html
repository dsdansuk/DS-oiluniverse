<div class="panel" id="panel-consumer">
      <div style="max-width:600px;margin:0 auto;padding:22px 16px 80px;">

        <!-- 헤더 -->
        <div style="text-align:center;margin-bottom:22px;">
          <div style="font-size:40px;margin-bottom:8px;">🫙</div>
          <div style="font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px;">식용유니버스</div>
          <div style="font-size:12px;color:var(--gray);">원주시 식용유 납품 · 폐유 수거 서비스</div>
        </div>

        <!-- 이번 주 시세 카드 -->
        <div class="card" style="margin-bottom:14px;">
          <div class="card-header" style="background:#0D0D0D;border-bottom:none;">
            <div class="card-title" style="color:var(--white);">💹 이번 주 시세</div>
            <div id="consumerPriceDate" style="font-size:10px;color:#555;"></div>
          </div>
          <div style="padding:16px;" id="consumerOilPrices"></div>
        </div>

        <!-- 폐유 수거 안내 -->
        <div class="card" style="margin-bottom:14px;">
          <div class="card-header">
            <div class="card-title">♻️ 폐유 수거 안내</div>
          </div>
          <div style="padding:16px;" id="consumerWasteInfo"></div>
        </div>

        <!-- 등록 업체 목록 -->
        <div class="card" style="margin-bottom:14px;">
          <div class="card-header">
            <div class="card-title">📍 원주시 등록 업체</div>
            <div style="font-size:10px;color:var(--gray);" id="consumerBizCount">0개 업체</div>
          </div>
          <div style="padding:12px 16px;" id="consumerBizList">
            <div style="text-align:center;padding:20px;color:var(--gray);font-size:12px;">등록된 업체가 없어요</div>
          </div>
        </div>

        <!-- 서비스 문의 -->
        <div style="background:linear-gradient(135deg,#0a2e1a,#05C46B);border-radius:var(--radius);padding:18px 20px;text-align:center;">
          <div style="font-family:var(--font-display);font-size:14px;font-weight:800;color:#fff;margin-bottom:6px;">서비스 신청 · 문의</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:14px;">식용유 납품 또는 폐유 수거 신청</div>
          <div style="display:flex;gap:8px;justify-content:center;">
            <button class="btn" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:10px 20px;" onclick="showToast('t1','📞 전화 문의','033-XXX-XXXX (식용유니버스)')">📞 전화 문의</button>
            <button class="btn btn-primary" style="padding:10px 20px;" onclick="showToast('t1','✅ 신청 완료','담당자가 연락드릴게요!')">신청하기</button>
          </div>
        </div>

      </div>
    </div>
