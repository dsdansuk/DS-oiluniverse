<div class="panel" id="panel-schedule" style="width:100%;overflow-y:auto;">
      <div style="background:linear-gradient(90deg,#FF9500,#E65100);padding:14px 26px;color:#fff;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
          <div>
            <div style="font-family:var(--font-display);font-size:16px;font-weight:800;letter-spacing:-0.02em;">📅 드라이버 주간 일정</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.85);margin-top:2px;">월~일 방문 일정 · 자동 + 수동 편집 가능</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button onclick="changeScheduleWeek(-1)" style="background:rgba(255,255,255,0.18);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:11px;font-weight:700;cursor:pointer;">◀ 이전</button>
            <button onclick="changeScheduleWeek(0)" style="background:#fff;color:#E65100;border:none;border-radius:8px;padding:7px 13px;font-size:11px;font-weight:800;cursor:pointer;">이번 주</button>
            <button onclick="changeScheduleWeek(1)" style="background:rgba(255,255,255,0.18);border:none;color:#fff;border-radius:8px;padding:7px 11px;font-size:11px;font-weight:700;cursor:pointer;">다음 ▶</button>
          </div>
        </div>
      </div>
      <div style="padding:18px 22px;">
        <!-- 드라이버 선택 -->
        <div id="scheduleDriverSelectRow" style="margin-bottom:14px;background:#fff;border-radius:12px;padding:14px 18px;box-shadow:var(--shadow);">
          <div style="font-size:11px;font-weight:700;color:#666;margin-bottom:6px;">🚛 드라이버 선택</div>
          <select id="scheduleDriverSelect" onchange="renderDriverSchedule()" style="width:100%;padding:11px 12px;border:1.5px solid #DDD;border-radius:9px;font-size:14px;font-weight:700;font-family:var(--font-body);">
            <option value="">전체 드라이버</option>
          </select>
        </div>

        <!-- 주간 일정 컨테이너 -->
        <div id="scheduleWeekRange" style="font-size:13px;font-weight:800;color:#444;text-align:center;margin-bottom:14px;background:#fff;padding:10px 14px;border-radius:9px;box-shadow:var(--shadow);"></div>
        <div id="driverScheduleGrid" style="display:flex;flex-direction:column;gap:10px;">
          <div style="text-align:center;padding:30px;color:var(--gray);font-size:13px;background:#fff;border-radius:12px;box-shadow:var(--shadow);">불러오는 중...</div>
        </div>

        <div style="margin-top:18px;background:#FFF3E0;border-radius:9px;padding:12px 14px;font-size:11px;color:#E65100;line-height:1.6;">
          💡 <strong>일정 출처</strong>: 자동발주/수거 신청 시 잡힌 방문일이 자동 표시됩니다. 직접 메모 추가도 가능해요.<br>
          🚛 <strong>운영 팁</strong>: 동선이 비슷한 업체는 같은 요일에 묶어서 처리하면 효율적입니다.
        </div>
      </div>
    </div>
