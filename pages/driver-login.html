<div class="panel" id="panel-driver-login" style="overflow-y:auto;width:100%;">
      <div style="max-width:420px;margin:40px auto;padding:0 24px;">
        <div style="text-align:center;margin-bottom:28px;">
          <div style="font-size:44px;margin-bottom:10px;">🚛</div>
          <div style="font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-0.03em;margin-bottom:5px;">운반자 로그인</div>
          <div style="font-size:12px;color:var(--gray);">수거·발주 업무를 처리하세요</div>
        </div>
        <div class="card" style="padding:26px;margin-bottom:12px;">
          <div class="form-group">
            <label class="form-label">운반자 아이디</label>
            <input class="form-input" id="driverLoginId" placeholder="아이디 입력" style="font-size:14px;"
              onkeydown="if(event.key==='Enter')document.getElementById('driverLoginPw').focus()">
          </div>
          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <input class="form-input" id="driverLoginPw" type="password" placeholder="비밀번호" style="font-size:14px;"
              onkeydown="if(event.key==='Enter')doDriverLogin()">
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:14px;" onclick="doDriverLogin()">🔐 로그인</button>
        </div>

        <!-- 운반자 신청 -->
        <div style="text-align:center;margin-bottom:10px;">
          <button id="driverJoinToggle" onclick="toggleDriverJoinForm()" style="background:none;border:1px dashed var(--gray-light);border-radius:8px;padding:8px 18px;font-size:12px;color:var(--gray);cursor:pointer;font-family:var(--font-body);">+ 운반자 신청</button>
        </div>
        <div id="driverJoinForm" style="display:none;">
          <div class="card" style="padding:20px;border:1.5px solid #93C5FD;">
            <div style="font-size:13px;font-weight:800;color:#185FA5;margin-bottom:14px;">🚛 운반자 계정 신청</div>
            <div style="font-size:11px;color:var(--gray);margin-bottom:12px;">관리자 승인 후 로그인이 가능해요</div>
            <div class="form-group">
              <label class="form-label">이름 <span style="color:var(--red-accent);">*</span></label>
              <input class="form-input" id="driverJoinName" placeholder="실명 입력" style="font-size:13px;">
            </div>
            <div class="form-group">
              <label class="form-label">아이디 <span style="color:var(--red-accent);">*</span></label>
              <input class="form-input" id="driverJoinId" placeholder="사용할 아이디" style="font-size:13px;">
            </div>
            <div class="form-group">
              <label class="form-label">비밀번호 <span style="color:var(--red-accent);">*</span></label>
              <input class="form-input" id="driverJoinPw" type="password" placeholder="4자리 이상" style="font-size:13px;">
            </div>
            <div class="form-group">
              <label class="form-label">연락처</label>
              <input class="form-input" id="driverJoinPhone" placeholder="010-0000-0000" style="font-size:13px;">
            </div>
            <button onclick="submitDriverJoin()" style="width:100%;background:#185FA5;border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--font-body);">신청하기</button>
          </div>
        </div>
      </div>
    </div>
