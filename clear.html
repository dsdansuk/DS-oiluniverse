<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>초기화</title>
</head>
<body style="font-family:sans-serif;text-align:center;padding:60px 24px;background:#f0f9f4;">
<div style="font-size:56px;">🫙</div>
<h2 style="color:#1F4D30;margin:16px 0 8px;">HIVE 초기화</h2>
<p style="color:#666;font-size:14px;">캐시·로그인 정보 삭제 후 최신 버전으로 시작해요</p>
<button id="btn" style="display:block;width:100%;max-width:320px;margin:24px auto;padding:16px;background:#1F4D30;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;">
  🔄 초기화 후 앱 열기
</button>
<div id="st" style="font-size:13px;color:#1F4D30;font-weight:700;margin-top:16px;"></div>
<script>
document.getElementById('btn').onclick = async function() {
  var st = document.getElementById('st');
  st.textContent = '처리 중...';
  try {
    if(window.caches){var k=await caches.keys();await Promise.all(k.map(function(c){return caches.delete(c);}));}
    if(navigator.serviceWorker){var r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(function(s){return s.unregister();}));}
    for(var key in localStorage){ if(key.indexOf('hiveoil_')===0 && key!=='hiveoil_admin_pw' && key!=='hiveoil_driver_pw' && key!=='hiveoil_prices') localStorage.removeItem(key); }
    localStorage.removeItem('hiveoil_session');
    localStorage.removeItem('hiveoil_businesses');
    localStorage.removeItem('hiveoil_history');
    localStorage.removeItem('hiveoil_pending_biz');
    st.textContent = '✅ 완료! 3초 후 앱으로 이동합니다...';
    setTimeout(function(){ location.href='https://cocodss7-cell.github.io/HIVEOIL/?t='+Date.now(); },3000);
  } catch(e) { st.textContent = '오류: '+e.message; }
};
</script>
</body>
</html>
